<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All my Strava activities on one map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="Polyline.encoded.js"></script>
    <link rel="stylesheet" href="L.Control.Locate.min.css" />
    <script src="L.Control.Locate.min.js" charset="utf-8"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      #map {
        width: 100%;
        height: 100vh;
        z-index: 1;
      }

      .leaflet-popup-content {
        color: black;
        line-height: 1.4;
        margin: 6px 20px 6px 8px; /* extra right margin to avoid the close button */
      }

      .leaflet-popup-content a:link,
      a:visited,
      a:active {
        text-decoration: none;
      }

      .leaflet-popup-content a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script>
      // The DOMContentLoaded event ensures the script runs only after the entire HTML page has been loaded.
      document.addEventListener("DOMContentLoaded", (event) => {
        console.log("DOM fully loaded and parsed");
        setupMap();
      });

      // Use `const` for variables that are assigned once and never changed.
      let map;
      let layerControl;
      const polylineGroup = new L.featureGroup();

      /**
       * Initializes the Leaflet map, all tile layers, and user controls.
       */
      function setupMap() {
        // --- Base Map Layer Definitions ---
        const osm = L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
          attribution: "© OpenStreetMap",
        });

        const esriWorldImagery = L.tileLayer(
          "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
          {
            maxZoom: 19,
            attribution: "© Esri",
          }
        );

        // Grouping Swisstopo layers for clarity
        const swisstopoWMS = "https://wms.geo.admin.ch/";
        const swisstopoAttribution = "© swisstopo";

        const pixelkarteFarbe = L.tileLayer.wms(swisstopoWMS, {
          layers: "ch.swisstopo.pixelkarte-farbe",
          format: "image/jpeg",
          detectRetina: true,
          attribution: swisstopoAttribution,
        });

        const pixelkarteGrau = L.tileLayer.wms(swisstopoWMS, {
          layers: "ch.swisstopo.pixelkarte-grau",
          format: "image/jpeg",
          detectRetina: true,
          attribution: swisstopoAttribution,
        });

        const swissImage = L.tileLayer.wms(swisstopoWMS, {
          layers: "ch.swisstopo.swissimage",
          format: "image/jpeg",
          detectRetina: true,
          attribution: swisstopoAttribution,
        });

        // --- Overlay Map Layer Definition ---
        const wanderwege = L.tileLayer.wms(swisstopoWMS, {
          layers: "ch.swisstopo.swisstlm3d-wanderwege",
          format: "image/png",
          transparent: true,
        });

        // --- Map Initialization ---
        map = L.map("map", {
          center: [46.8182, 8.2275], // Centered on Switzerland
          zoom: 8,
          layers: [osm], // Set the initial base layer
          zoomControl: false, // Disable default zoom control to reposition it
        });

        // --- Layer Groups for the Control Box ---
        const baseMaps = {
          OpenStreetMap: osm,
          "Esri World Imagery": esriWorldImagery,
          "Swisstopo Color": pixelkarteFarbe,
          "Swisstopo Grey": pixelkarteGrau,
          "Swisstopo Aerial": swissImage,
        };

        const overlayMaps = {
          "Swiss Hiking Trails": wanderwege,
        };

        // --- Add Controls to the Map ---
        layerControl = L.control.layers(baseMaps, overlayMaps).addTo(map);
        L.control.zoom({ position: "topleft" }).addTo(map);
        L.control.locate().addTo(map);

        // Fetch and draw the activity data on the map
        loadAndDrawActivities();
      }

      /**
       * Fetches activity data using the modern async/await syntax and handles potential errors.
       */
      async function loadAndDrawActivities() {
        try {
          const response = await fetch("./allActivities.json");
          if (!response.ok) {
            throw new Error(`HTTP error! Status: ${response.status}`);
          }
          const activities = await response.json();
          addPolylinesToMap(activities);
        } catch (error) {
          console.error("Could not fetch or process activity data:", error);
        }
      }

      /**
       * Processes an array of activities and adds them as polylines to a single layer group.
       * @param {Array} activities - The array of activity objects from the JSON file.
       */
      function addPolylinesToMap(activities) {
        // Define line weights here for easy adjustments
        const normalWeight = 8;
        const highlightWeight = 10;

        // This variable will hold a reference to the currently selected polyline.
        let selectedPolyline = null;
        // Track the currently hovered polyline to handle fast cursor movement.
        let hoveredPolyline = null;

        activities.forEach((item) => {
          // Skip any activity that doesn't have a polyline
          if (!item.map.summary_polyline) {
            return;
          }

          // Convert distance to km and format it.
          const distanceInKm = (item.distance / 1000).toFixed(2);

          // Use template literals (`) for cleaner, multi-line HTML strings.
          const activityInfo = `
            <a style="color: #FC5200" href="javascript:openStravaLink(${item.id});">${item.name}</a><br>
            ${item.type} - ${distanceInKm} km<br>
            <a style="color: black" href="javascript:saveGPX(${item.id});">Download GPX file</a>
          `;

          // Decode the polyline and create a Leaflet layer
          const coordinates = L.Polyline.fromEncoded(item.map.summary_polyline).getLatLngs();
          const polyline = L.polyline(coordinates, {
            color: "#FF00FF",
            weight: normalWeight, // Use variable
          });

          // Bind the popup to the polyline layer with a max-width option.
          polyline.bindPopup(activityInfo, {
            maxWidth: 150,
          });

          // Handle mouse hovering
          polyline.on("mouseover", function () {
            // When the cursor moves fast, mouseout on the previous polyline can be
            // skipped by the browser. Reset it here to avoid stuck highlights.
            if (hoveredPolyline && hoveredPolyline !== this && hoveredPolyline !== selectedPolyline) {
              hoveredPolyline.setStyle({ color: "#FF00FF", weight: normalWeight });
            }
            hoveredPolyline = this;
            this.bringToFront();
            // Only apply the hover style if this line is NOT the selected one.
            if (this !== selectedPolyline) {
              this.setStyle({ color: "blue", weight: highlightWeight });
            }
          });

          // Handle mouse moving out
          polyline.on("mouseout", function () {
            hoveredPolyline = null;
            // Only revert the style if this line is NOT the selected one.
            if (this !== selectedPolyline) {
              this.setStyle({ color: "#FF00FF", weight: normalWeight });
            }
          });

          // Handle click events to select a line
          polyline.on("click", function () {
            // If a different line was already selected, reset its style.
            if (selectedPolyline && selectedPolyline !== this) {
              selectedPolyline.setStyle({
                color: "#FF00FF",
                weight: normalWeight, // Use variable
              });
            }
            // Set the current line as the new selected line and apply the style.
            selectedPolyline = this;
            this.setStyle({
              color: "blue",
              weight: highlightWeight, // Use variable
            });
          });

          // Handle the closing of a popup
          polyline.on("popupclose", function () {
            // When the popup is closed, reset this line's style.
            this.setStyle({
              color: "#FF00FF",
              weight: normalWeight, // Use variable
            });
            // Clear the selected state.
            selectedPolyline = null;
          });

          // Add the polyline to our group instead of directly to the map
          polylineGroup.addLayer(polyline);
        });

        // Add the entire group of polylines to the map in one single operation
        map.addLayer(polylineGroup);

        // Once all polylines are added, zoom the map to fit all of them perfectly.
        if (polylineGroup.getLayers().length > 0) {
          map.fitBounds(polylineGroup.getBounds());
        }
      }

      /**
       * Opens a new browser tab to the corresponding Strava activity page.
       * @param {number} id - The Strava activity ID.
       */
      function openStravaLink(id) {
        const url = `https://www.strava.com/activities/${id}`;
        window.open(url, "_blank"); // '_blank' ensures it opens in a new tab
      }

      /**
       * Triggers a browser download for the corresponding GPX file.
       * @param {number} id - The activity ID, used to build the GPX file path.
       */
      function saveGPX(id) {
        // Create a temporary anchor element to trigger the download
        const a = document.createElement("a");
        a.href = `activities/${id}.gpx`;
        a.download = `${id}.gpx`;
        document.body.appendChild(a); // Add it to the DOM
        a.click(); // Programmatically click it
        document.body.removeChild(a); // Clean up and remove it
      }
    </script>
  </body>
</html>
